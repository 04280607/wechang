<!-- 百度翻译核心（优化版：缓存 + 提速 + 防重复翻译） -->
<script src="https://cdn.jsdelivr.net/npm/blueimp-md5/js/md5.min.js"></script>
<script>
const lang = location.pathname.replace('/', '') || 'zh'

function changeLang(l){
  if(l==='zh') location.href='/'
  else location.href='/' + l
}

// 本地缓存（防止重复请求，提高速度）
const cache = {}

async function translateText(text, target){
  if(cache[text]) return cache[text]

  const appid = "19951785296@163.com"
  const key = "Gjy@280012"
  const salt = Date.now()
  const sign = md5(appid + text + salt + key)

  try{
    const res = await fetch(`https://fanyi-api.baidu.com/api/trans/vip/translate?q=${encodeURIComponent(text)}&from=auto&to=${target}&appid=${appid}&salt=${salt}&sign=${sign}`)
    const data = await res.json()

    const result = data.trans_result ? data.trans_result[0].dst : text
    cache[text] = result
    return result

  }catch(e){
    console.log('翻译失败', e)
    return text
  }
}

async function translatePage(lang){
  if(lang==='zh') return

  const elements = document.querySelectorAll('h1,h2,h3,p,a,span')

  for(const el of elements){
    if(el.dataset.translated) continue

    const text = el.innerText.trim()
    if(!text) continue

    const result = await translateText(text, lang)
    el.innerText = result
    el.dataset.translated = 'true'
  }

  // 阿拉伯语右对齐
  if(lang==='ara'){
    document.body.style.direction='rtl'
    document.body.style.textAlign='right'
  }
}

translatePage(lang)
</script>
